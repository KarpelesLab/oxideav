name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: oxideav

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (with target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p oxideav-cli

      - name: Stage release artifact (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -eu
          version="${GITHUB_REF_NAME}"
          stage="${BIN_NAME}-${version}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${stage}/"
          cp README.md "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"

      - name: Stage release artifact (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $stage = "$env:BIN_NAME-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist\$stage" | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\$env:BIN_NAME.exe" "dist\$stage\"
          Copy-Item README.md "dist\$stage\"
          Compress-Archive -Path "dist\$stage" -DestinationPath "dist\$stage.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          fail_on_unmatched_files: true
          generate_release_notes: true
