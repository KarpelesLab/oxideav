name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # oxideplay loads SDL2 at runtime via libloading instead of linking
      # at build time, so SDL2 is *not* required to build or test the
      # workspace. The binary will simply emit a "SDL2 library not found
      # at runtime" error if you try to play media without it installed.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build (workspace)
        run: cargo build --workspace --all-targets --verbose

      - name: Test (workspace)
        run: cargo test --workspace --verbose

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # libloading is pure Rust and oxideplay no longer links SDL2, so
      # clippy does not need any system packages installed.

      - name: Install Rust toolchain (with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --workspace -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
