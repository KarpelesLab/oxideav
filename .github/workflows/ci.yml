name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # oxideplay links against SDL2 (the only crate in the workspace
      # that depends on a non-Rust library). Install it from the host
      # package manager so cargo can find it.
      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install sdl2
          # Apple Silicon Homebrew installs to /opt/homebrew, which is
          # NOT on the default linker search path. Surface it via env.
          PREFIX="$(brew --prefix)"
          echo "LIBRARY_PATH=${PREFIX}/lib:${LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${PREFIX}/lib:${DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Install SDL2 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/libsdl-org/SDL/releases/download/release-2.30.10/SDL2-devel-2.30.10-VC.zip"
          Invoke-WebRequest -Uri $url -OutFile sdl2.zip
          Expand-Archive sdl2.zip -DestinationPath sdl2
          $libDir = (Resolve-Path "sdl2/SDL2-2.30.10/lib/x64").Path
          # Linker search path: rustc passes LIB through to link.exe.
          "LIB=$env:LIB;$libDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          # Runtime DLL search path for tests / the oxideplay binary.
          $libDir | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build (workspace)
        run: cargo build --workspace --all-targets --verbose

      - name: Test (workspace)
        run: cargo test --workspace --verbose

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Install Rust toolchain (with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --workspace -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
